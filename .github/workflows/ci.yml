name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: gofmt
        run: test -z "$(gofmt -l .)"

      - name: vet
        run: go vet ./...

      - name: test
        run: go test -count=1 ./...

      - name: race
        run: go test -race -count=1 ./...

      - name: coverage
        run: go test -coverprofile=coverage.out -count=1 ./...
